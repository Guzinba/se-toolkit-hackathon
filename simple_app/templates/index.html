<!DOCTYPE html><html><head><meta charset="UTF-8"><title>✨ QuickNote AI</title>
<style>body{font-family:system-ui,sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f8f9fa}.card{background:white;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}textarea{width:100%;min-height:120px;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px}button{background:#4f46e5;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:12px}button:hover{background:#4338ca}.result{margin-top:20px;padding:16px;background:#f0f9ff;border-radius:8px;display:none}.result.show{display:block}.tags{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tag{background:#e0e7ff;color:#3730a3;padding:4px 12px;border-radius:20px;font-size:14px}</style></head>
<body><div class="card"><h1>✨ QuickNote AI</h1><textarea id="content" placeholder="Введите заметку..."></textarea><button onclick="go()">🚀 Обработать</button><div class="result" id="result"><div><strong>🏷️ Теги:</strong> <div class="tags" id="tags"></div></div><div style="margin-top:12px"><strong>💡 Инсайт:</strong> <p id="insight"></p></div></div></div>
<script>async function go(){const c=document.getElementById('content').value.trim();if(!c)return;document.getElementById('result').classList.remove('show');const r=await fetch('/api/process',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c})});const d=await r.json();document.getElementById('tags').innerHTML=d.tags.map(t=>'<span class="tag">#'+t+'</span>').join('');document.getElementById('insight').textContent=d.insight;document.getElementById('result').classList.add('show');}</script></body></html>
